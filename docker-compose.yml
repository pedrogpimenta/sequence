services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "9100:80"
      - "9143:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - server
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    restart: unless-stopped
    develop:
      watch:
        - path: ./frontend/src
          action: rebuild
        - path: ./frontend/index.html
          action: rebuild
        - path: ./frontend/vite.config.js
          action: rebuild
        - path: ./frontend/package.json
          action: rebuild

  server:
    build:
      context: ./server
    expose:
      - "8080"
    environment:
      PORT: "8080"
      DB_PATH: "/data/sequence.db"
    volumes:
      - server_data:/data
    restart: unless-stopped
    develop:
      watch:
        - path: ./server/src
          action: sync+restart
          target: /app/src
        - path: ./server/package.json
          action: rebuild

volumes:
  caddy_data:
  caddy_config:
  server_data:
