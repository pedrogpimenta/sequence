services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - server
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    restart: unless-stopped

  server:
    build:
      context: ./server
    expose:
      - "8080"
    environment:
      PORT: "8080"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
